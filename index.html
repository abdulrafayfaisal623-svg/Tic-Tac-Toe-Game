<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Neon Tic Tac Toe</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body{

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            overflow: hidden;

            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);

            color: white;

            position: relative;

        }

        body::before{

            content: '';

            position: absolute;

            width: 600px;

            height: 600px;

            background: rgba(139, 92, 246, 0.3);

            border-radius: 50%;

            top: -200px;

            left: -200px;

            filter: blur(120px);

        }

        body::after{

            content: '';

            position: absolute;

            width: 500px;

            height: 500px;

            background: rgba(0, 191, 255, 0.3);

            border-radius: 50%;

            bottom: -200px;

            right: -200px;

            filter: blur(120px);

        }

        .container{

            position: relative;

            z-index: 1;

            text-align: center;

            background: rgba(255,255,255,0.08);

            backdrop-filter: blur(15px);

            border: 2px solid rgba(255,255,255,0.2);

            border-radius: 25px;

            padding: 40px;

            box-shadow: 0 0 30px rgba(0,0,0,0.5);

        }

        h1{

            font-size: 60px;

            margin-bottom: 20px;

            color: #8b5cf6;

            text-shadow: 0 0 20px #8b5cf6;

            animation: glow 2s infinite alternate;

        }

        @keyframes glow{

            from{

                text-shadow: 0 0 10px #8b5cf6;

            }

            to{

                text-shadow: 0 0 35px #00bfff;

            }

        }

        .status{

            font-size: 24px;

            margin-bottom: 25px;

            color: #ffffff;

        }

        .scoreboard{

            display: flex;

            justify-content: center;

            gap: 20px;

            margin-bottom: 30px;

            flex-wrap: wrap;

        }

        .score-box{

            background: rgba(255,255,255,0.08);

            border: 1px solid rgba(255,255,255,0.2);

            padding: 15px 25px;

            border-radius: 15px;

            min-width: 140px;

            box-shadow: 0 0 20px rgba(139,92,246,0.4);

        }

        .score-box h3{

            color: #8b5cf6;

            margin-bottom: 8px;

        }

        .score-box p{

            font-size: 22px;

        }

        .board{

            display: grid;

            grid-template-columns: repeat(3, 120px);

            grid-template-rows: repeat(3, 120px);

            gap: 15px;

            justify-content: center;

        }

        .cell{

            width: 120px;

            height: 120px;

            background: rgba(255,255,255,0.08);

            border: 2px solid rgba(255,255,255,0.2);

            border-radius: 20px;

            display: flex;

            justify-content: center;

            align-items: center;

            font-size: 60px;

            cursor: pointer;

            transition: 0.3s;

            backdrop-filter: blur(10px);

        }

        .cell:hover{

            transform: scale(1.08);

            box-shadow: 0 0 20px #8b5cf6;

            border-color: #8b5cf6;

        }

        .x{

            color: #00bfff;

            text-shadow: 0 0 20px #00bfff;

        }

        .o{

            color: #ff00ff;

            text-shadow: 0 0 20px #ff00ff;

        }

        .winner{

            animation: winnerGlow 1s infinite alternate;

        }

        @keyframes winnerGlow{

            from{

                box-shadow: 0 0 10px #8b5cf6;

            }

            to{

                box-shadow: 0 0 30px #00bfff;

            }

        }

        .buttons{

            margin-top: 30px;

        }

        button{

            padding: 15px 35px;

            margin: 10px;

            border: none;

            border-radius: 12px;

            background: linear-gradient(to right, #8b5cf6, #00bfff);

            color: white;

            font-size: 16px;

            cursor: pointer;

            transition: 0.3s;

            font-weight: bold;

            letter-spacing: 1px;

        }

        button:hover{

            transform: scale(1.08);

            box-shadow: 0 0 20px #8b5cf6;

        }

        .light{

            background: linear-gradient(to right, #ffffff, #dddddd);

            color: black;

        }

        .light .container{

            background: rgba(0,0,0,0.05);

        }

        .light .cell{

            background: rgba(0,0,0,0.08);

            color: black;

        }

        .light .score-box{

            background: rgba(0,0,0,0.08);

            color: black;

        }

        @media(max-width: 600px){

            h1{

                font-size: 38px;

            }

            .board{

                grid-template-columns: repeat(3, 90px);

                grid-template-rows: repeat(3, 90px);

            }

            .cell{

                width: 90px;

                height: 90px;

                font-size: 45px;

            }

            .status{

                font-size: 18px;

            }

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>NEON TIC TAC TOE</h1>

        <div class="status" id="status">
            🔥 Player X's Move
        </div>

        <div class="scoreboard">

            <div class="score-box">

                <h3>PLAYER X</h3>

                <p id="xScore">0</p>

            </div>

            <div class="score-box">

                <h3>PLAYER O</h3>

                <p id="oScore">0</p>

            </div>

            <div class="score-box">

                <h3>DRAWS</h3>

                <p id="drawScore">0</p>

            </div>

        </div>

        <div class="board">

            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>

            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>

            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>

        </div>

        <div class="buttons">

            <button onclick="restartGame()">🔄 Restart</button>

            <button onclick="toggleTheme()">🌙 Theme</button>

        </div>

    </div>

    <script>

        const cells = document.querySelectorAll(".cell");

        const statusText = document.getElementById("status");

        const xScoreText = document.getElementById("xScore");

        const oScoreText = document.getElementById("oScore");

        const drawScoreText = document.getElementById("drawScore");

        let currentPlayer = "X";

        let gameActive = true;

        let gameState = ["","","","","","","","",""];

        let xScore = 0;

        let oScore = 0;

        let drawScore = 0;

        const winningConditions = [

            [0,1,2],
            [3,4,5],
            [6,7,8],

            [0,3,6],
            [1,4,7],
            [2,5,8],

            [0,4,8],
            [2,4,6]

        ];

        function handleCellClick(){

            const index = this.getAttribute("data-index");

            if(gameState[index] !== "" || !gameActive){

                return;

            }

            gameState[index] = currentPlayer;

            this.textContent = currentPlayer;

            this.classList.add(currentPlayer.toLowerCase());

            checkWinner();

        }

        function checkWinner(){

            let roundWon = false;

            let winningCells = [];

            for(let i = 0; i < winningConditions.length; i++){

                const condition = winningConditions[i];

                const a = gameState[condition[0]];
                const b = gameState[condition[1]];
                const c = gameState[condition[2]];

                if(a === "" || b === "" || c === ""){

                    continue;

                }

                if(a === b && b === c){

                    roundWon = true;

                    winningCells = condition;

                    break;

                }

            }

            if(roundWon){

                statusText.textContent =
                `🏆 Player ${currentPlayer} Dominates!`;

                winningCells.forEach(index => {

                    cells[index].classList.add("winner");

                });

                if(currentPlayer === "X"){

                    xScore++;

                    xScoreText.textContent = xScore;

                }

                else{

                    oScore++;

                    oScoreText.textContent = oScore;

                }

                gameActive = false;

                return;

            }

            if(!gameState.includes("")){

                statusText.textContent =
                "🤝 It's a Tie!";

                drawScore++;

                drawScoreText.textContent = drawScore;

                gameActive = false;

                return;

            }

            currentPlayer =
            currentPlayer === "X" ? "O" : "X";

            statusText.textContent =
            `🔥 Player ${currentPlayer}'s Move`;

        }

        function restartGame(){

            currentPlayer = "X";

            gameActive = true;

            gameState = ["","","","","","","","",""];

            statusText.textContent =
            "🔥 Player X's Move";

            cells.forEach(cell => {

                cell.textContent = "";

                cell.classList.remove("x");

                cell.classList.remove("o");

                cell.classList.remove("winner");

            });

        }

        function toggleTheme(){

            document.body.classList.toggle("light");

        }

        cells.forEach(cell => {

            cell.addEventListener("click", handleCellClick);

        });

    </script>

</body>

</html>
