<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Advanced Tic Tac Toe</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #000000, #001f1f, #003333);
            overflow: hidden;
            color: white;
        }

        .container{
            text-align: center;
            padding: 20px;
        }

        h1{
            font-size: 65px;
            color: #00ffcc;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ffcc;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow{

            from{
                text-shadow: 0 0 10px #00ffcc;
            }

            to{
                text-shadow: 0 0 30px white;
            }

        }

        .status{
            font-size: 28px;
            margin-bottom: 20px;
        }

        .scoreboard{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .score-box{
            background: rgba(255,255,255,0.08);
            border: 2px solid #00ffcc;
            padding: 15px 25px;
            border-radius: 15px;
            min-width: 130px;
            box-shadow: 0 0 15px rgba(0,255,204,0.4);
        }

        .score-box h3{
            color: #00ffcc;
            margin-bottom: 8px;
        }

        .board{
            display: grid;
            grid-template-columns: repeat(3, 120px);
            grid-template-rows: repeat(3, 120px);
            gap: 12px;
            justify-content: center;
        }

        .cell{
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.08);
            border: 2px solid #00ffcc;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 65px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(6px);
        }

        .cell:hover{
            transform: scale(1.05);
            background: rgba(0,255,204,0.2);
            box-shadow: 0 0 20px #00ffcc;
        }

        .x{
            color: #00ffcc;
            text-shadow: 0 0 15px #00ffcc;
        }

        .o{
            color: #ffcc00;
            text-shadow: 0 0 15px #ffcc00;
        }

        .winner{
            background: rgba(0,255,204,0.3);
            animation: winnerGlow 1s infinite alternate;
        }

        @keyframes winnerGlow{

            from{
                box-shadow: 0 0 10px #00ffcc;
            }

            to{
                box-shadow: 0 0 30px white;
            }

        }

        .buttons{
            margin-top: 30px;
        }

        button{
            padding: 15px 35px;
            margin: 10px;
            border: none;
            border-radius: 12px;
            background: #00ffcc;
            color: black;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: white;
            transform: scale(1.05);
            box-shadow: 0 0 20px #00ffcc;
        }

        .light{
            background: linear-gradient(to right, #ffffff, #dddddd);
            color: black;
        }

        .light .cell{
            background: rgba(0,0,0,0.08);
            color: black;
            border: 2px solid black;
        }

        .light .score-box{
            background: rgba(0,0,0,0.08);
            border: 2px solid black;
            color: black;
        }

        .light button{
            background: black;
            color: white;
        }

        @media(max-width: 600px){

            h1{
                font-size: 40px;
            }

            .board{
                grid-template-columns: repeat(3, 90px);
                grid-template-rows: repeat(3, 90px);
            }

            .cell{
                width: 90px;
                height: 90px;
                font-size: 45px;
            }

            .status{
                font-size: 22px;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Tic Tac Toe</h1>

        <div class="scoreboard">

            <div class="score-box">

                <h3>Player X</h3>

                <p id="xScore">0</p>

            </div>

            <div class="score-box">

                <h3>Player O</h3>

                <p id="oScore">0</p>

            </div>

            <div class="score-box">

                <h3>Draws</h3>

                <p id="drawScore">0</p>

            </div>

        </div>

        <div class="status" id="status">
            Player X Turn
        </div>

        <div class="board">

            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>

            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>

            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>

        </div>

        <div class="buttons">

            <button onclick="restartGame()">Restart</button>

            <button onclick="toggleTheme()">🌙 Theme</button>

        </div>

    </div>

    <script>

        const cells = document.querySelectorAll(".cell");

        const statusText = document.getElementById("status");

        const xScoreText = document.getElementById("xScore");

        const oScoreText = document.getElementById("oScore");

        const drawScoreText = document.getElementById("drawScore");

        let currentPlayer = "X";

        let gameActive = true;

        let gameState = ["","","","","","","","",""];

        let xScore = 0;

        let oScore = 0;

        let drawScore = 0;

        const winningConditions = [

            [0,1,2],
            [3,4,5],
            [6,7,8],

            [0,3,6],
            [1,4,7],
            [2,5,8],

            [0,4,8],
            [2,4,6]

        ];

        function handleCellClick(){

            const index = this.getAttribute("data-index");

            if(gameState[index] !== "" || !gameActive){

                return;

            }

            gameState[index] = currentPlayer;

            this.textContent = currentPlayer;

            this.classList.add(currentPlayer.toLowerCase());

            checkWinner();

        }

        function checkWinner(){

            let roundWon = false;

            let winningCells = [];

            for(let i = 0; i < winningConditions.length; i++){

                const condition = winningConditions[i];

                const a = gameState[condition[0]];
                const b = gameState[condition[1]];
                const c = gameState[condition[2]];

                if(a === "" || b === "" || c === ""){

                    continue;

                }

                if(a === b && b === c){

                    roundWon = true;

                    winningCells = condition;

                    break;

                }

            }

            if(roundWon){

                statusText.textContent = `Player ${currentPlayer} Wins! 🎉`;

                winningCells.forEach(index => {

                    cells[index].classList.add("winner");

                });

                if(currentPlayer === "X"){

                    xScore++;

                    xScoreText.textContent = xScore;

                }

                else{

                    oScore++;

                    oScoreText.textContent = oScore;

                }

                gameActive = false;

                return;

            }

            if(!gameState.includes("")){

                statusText.textContent = "Game Draw! 😄";

                drawScore++;

                drawScoreText.textContent = drawScore;

                gameActive = false;

                return;

            }

            currentPlayer = currentPlayer === "X" ? "O" : "X";

            statusText.textContent = `Player ${currentPlayer} Turn`;

        }

        function restartGame(){

            currentPlayer = "X";

            gameActive = true;

            gameState = ["","","","","","","","",""];

            statusText.textContent = "Player X Turn";

            cells.forEach(cell => {

                cell.textContent = "";

                cell.classList.remove("x");

                cell.classList.remove("o");

                cell.classList.remove("winner");

            });

        }

        function toggleTheme(){

            document.body.classList.toggle("light");

        }

        cells.forEach(cell => {

            cell.addEventListener("click", handleCellClick);

        });

    </script>

</body>

</html>
